<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Stanish</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6dd5fa, #2980b9);
            color: #fff;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .button-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .nav-button {
            background: #ffffff;
            color: #2980b9;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .nav-button:hover {
            background: #f1f1f1;
            transform: translateY(-3px);
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Decorative floating circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            animation: float 8s infinite ease-in-out;
        }

        .circle.small { width: 60px; height: 60px; top: 20%; left: 10%; }
        .circle.medium { width: 120px; height: 120px; top: 60%; left: 70%; }
        .circle.large { width: 200px; height: 200px; top: 30%; left: 80%; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>

    <!-- Decorative circles -->
    <div class="circle small"></div>
    <div class="circle medium"></div>
    <div class="circle large"></div>

    <header>
        <h1>Welcome to Andrew's Webpage</h1>
        <p class="subtitle">Where you can learn all about Andrew Stanish!</p>
    </header>

    <div class="button-container">
        <a href="https://29miaoet.github.io/Andrew_WebPage/Andrew_Stanish.html" class="nav-button">Andrew's Formal Webpage</a>
        <a href="https://29miaoet.github.io/Andrew_WebPage/Andrew_Stanish_Fake.html" class="nav-button">Andrew's Informal Webpage</a>
        <a href="https://en.wikipedia.org/wiki/User:29miaoet/sandbox" class="nav-button">Andrew's Wikipedia Article</a>
    </div>

    <footer>
        © 2026 Andrew's Personal Webpage — Designed by Ethan Miao
    </footer>

</body>
</html>
