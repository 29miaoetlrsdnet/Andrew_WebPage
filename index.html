<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andrew Stanish</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:"Segoe UI", Arial, sans-serif;
background:linear-gradient(180deg,#e8f6ff,#b9e2ff);
color:#03324d;
text-align:center;
}

/* Layout to push footer to bottom */

.wrapper{
min-height:100%;
display:flex;
flex-direction:column;
}

main{
flex:1;
}

/* HEADER */

header{
padding:60px 20px 20px;
}

h1{
font-size:3rem;
}

.subtitle{
margin-top:10px;
font-size:1.2rem;
opacity:.85;
}

/* PROFILE IMAGE */

.profile-container{
margin-top:25px;
}

.profile-img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* CURLING HOUSE */

.house{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
left:50%;
top:55%;
transform:translate(-50%,-50%);
z-index:-1;

background:
radial-gradient(circle,
#1e90ff 0 70px,
white 70px 110px,
#d91c1c 110px 160px,
white 160px 210px,
#1e90ff 210px);

opacity:.25;
}

/* BUTTONS */

.button-container{
margin-top:35px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.nav-button{
background:rgba(255,255,255,.9);
padding:16px 32px;
border-radius:40px;
text-decoration:none;
font-size:1.1rem;
font-weight:600;
color:#03324d;
box-shadow:0 8px 20px rgba(0,0,0,.15);
transition:.25s;
}

.nav-button:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 12px 25px rgba(0,0,0,.25);
background:white;
}

/* CURLING STONES */


.stone{
position:absolute;
width:120px;
height:65px;
border-radius:40px;

/* smooth emoji-style stone */
background:linear-gradient(
to bottom,
#e9ecef 0%,
#cfd4d9 40%,
#9da3a9 70%,
#7f868c 100%
);

/* depth + ice shadow */
box-shadow:
inset 0 6px 8px rgba(255,255,255,.7),
inset 0 -10px 12px rgba(0,0,0,.35),
0 10px 16px rgba(0,0,0,.35);
}

/* thick gray top ring */
.stone::before{
content:"";
position:absolute;

top:-8px;
left:6px;

width:108px;
height:32px;

border-radius:50%;

background:linear-gradient(
to bottom,
#f5f6f7,
#c3c7cc 45%,
#a0a6ac
);

box-shadow:
inset 0 -4px 6px rgba(0,0,0,.35),
0 3px 4px rgba(0,0,0,.3);
}

/* emoji-style red handle */
.stone::after{
content:"";
position:absolute;

top:-22px;
left:34px;

width:50px;
height:22px;

border-radius:14px 14px 8px 8px;

background:linear-gradient(
to bottom,
#ff5a5a,
#d81f1f
);

box-shadow:
inset 0 3px 4px rgba(255,255,255,.5),
inset 0 -4px 5px rgba(0,0,0,.35),
0 3px 5px rgba(0,0,0,.35);
}

/* animation positions */

.stone.left{
top:40%;
left:7%;
animation:slide 6s infinite ease-in-out;
}

.stone.right{
top:65%;
right:7%;
animation:slide 7s infinite ease-in-out reverse;
}

@keyframes slide{
0%{transform:translateX(0)}
50%{transform:translateX(40px)}
100%{transform:translateX(0)}
}

/* FOOTER */

footer{
padding:20px;
font-size:.9rem;
opacity:.75;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="house"></div>
<div class="stone left"></div>
<div class="stone right"></div>

<main>

<header>
<h1>Andrew Stanish</h1>
<p class="subtitle">Curling Athlete</p>
</header>

<div class="profile-container">
<img src="https://29miaoet.github.io/Andrew_WebPage/image.png" alt="Profile Photo" class="profile-img">
</div>

<div class="button-container">

<a href="https://29miaoet.github.io/Andrew_WebPage/Andrew_Stanish.html" class="nav-button">
Formal Webpage
</a>

<a href="https://29miaoet.github.io/Andrew_WebPage/Andrew_Stanish_Fake.html" class="nav-button">
Informal Webpage
</a>

<a href="https://en.wikipedia.org/wiki/User:29miaoet/sandbox" class="nav-button">
Wikipedia Article
</a>

</div>

</main>

<footer>
© 2026 Andrew's Personal Webpage — Designed by Ethan Miao
</footer>

</div>

</body>
</html>
